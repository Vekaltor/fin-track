<div>
  <app-input-label [label]="label()" [className]="className()" />
  <app-input-field
    [field]="field()"
    type="number"
    [inputMode]="inputMode()"
    [placeholder]="placeholder()"
    [className]="className()"
  />
  @if (showInlineError()) {
    <app-input-error [field]="field()"/>
  }
</div>
