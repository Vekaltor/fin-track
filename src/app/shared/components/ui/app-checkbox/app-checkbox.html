<label
  class="inline-flex cursor-pointer select-none items-center gap-3"
  [class.opacity-50]="disabled()"
  [class.cursor-not-allowed]="disabled()"
>
  <input
    type="checkbox"
    class="sr-only"
    [checked]="checked()"
    [disabled]="disabled()"
    (change)="onToggle()"
  />
  <span [class]="boxClass()" aria-hidden="true">
    @if (checked()) {
      <svg class="h-3 w-3" viewBox="0 0 12 12" fill="none">
        <path
          d="M2 6.5L4.8 9.2L10 3.5"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    }
  </span>
  <span class="text-sm font-medium text-dark">
    <ng-content />
  </span>
</label>
