@if (open()) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center bg-dark/40 p-4 backdrop-blur-[1px]"
    role="alertdialog"
    aria-modal="true"
    (click)="onBackdropClick()"
  >
    <div
      class="w-full max-w-md rounded-2xl bg-white p-6 shadow-2xl"
      (click)="$event.stopPropagation()"
    >
      <div [class]="iconWrapperClass()">
        <ng-icon [name]="iconName()" class="text-2xl" />
      </div>
      <h2 class="text-lg font-semibold text-dark">{{ title() }}</h2>
      @if (message()) {
        <p class="mt-2 text-sm leading-relaxed text-muted">{{ message() }}</p>
      }
      <ng-content />
      <div class="mt-6 flex justify-end gap-3">
        <app-button variant="secondary" [disabled]="loading()" (clicked)="onCancel()">
          {{ cancelLabel() }}
        </app-button>
        <app-button
          [variant]="confirmButtonVariant()"
          [loading]="loading()"
          (clicked)="onConfirm()"
        >
          {{ confirmLabel() }}
        </app-button>
      </div>
    </div>
  </div>
}
