<div class="login-container">
  <form class="login-card" (submit)="handleSubmit($event)" novalidate>
    <h2 class="login-card__title">
      Logowanie
    </h2>

    <div class="form-group">
      <input
        class="form-group__input form-group__input--email"
        type="email"
        placeholder="Adres e-mail"
        [formField]="loginForm.email"
      />
      @if (loginForm.email() | hasError : 'touched') {
        <div class="error-message">
          <span class="error-message__text">
            {{ loginForm.email() | fieldError }}
          </span>
        </div>
      }
    </div>

    <div class="form-group">
      <input
        class="form-group__input form-group__input--password"
        type="password"
        placeholder="Hasło"
        [formField]="loginForm.password"
      />
      @if (loginForm.password() | hasError : 'touched') {
        <div class="error-message">
          <span class="error-message__text">
            {{ loginForm.password() | fieldError }}
          </span>
        </div>
      }
    </div>

    <button
      class="login-card__button"
      type="submit"
      [disabled]="loginForm().submitting()"
    >
      @if (loginForm().submitting()) {
      <span class="login-card__button-text login-card__button-text--loading">
        Logowanie
      </span>
      } @else {
      <span class="login-card__button-text">
        Zaloguj się
      </span>
      }
    </button>
  </form>
</div>
