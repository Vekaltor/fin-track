<div class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
  <form class="bg-white border border-gray-200 rounded-2xl p-10 w-96 shadow-sm" (submit)="handleSubmit($event)"
        novalidate>

    <app-auth-brand/>

    <div class="text-center mb-7">
      <h2 class="text-base font-semibold text-gray-900">Zaloguj się do konta</h2>
    </div>

    <div class="mb-4">
      <app-email-field label="Adres email" placeholder="jan@mail.com" [field]="loginForm.email"/>
    </div>

    <div class="mb-4">
      <app-password-field label="Hasło" placeholder="••••••••" [field]="loginForm.password"/>
    </div>

    <app-button className="w-full" type="submit" [variant]="'primary'" [loading]="loginForm().submitting()">
      Zaloguj się
    </app-button>

    <app-test-demo-credentials/>
  </form>
</div>
