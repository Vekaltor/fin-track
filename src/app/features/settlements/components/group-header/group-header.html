<div class="flex items-center justify-between gap-4 px-4 py-4">
  <div class="flex min-w-0 items-center gap-3">
    <div class="min-w-0">
      <h3 class="truncate font-semibold text-dark">{{ group().name }}</h3>
      <p class="text-sm text-muted">{{ group().filteredSettlements.length | entriesCountLabel }}</p>
    </div>
  </div>

  <app-group-header-actions
    (addEntry)="addEntry.emit()"
    (deleteGroup)="deleteGroup.emit()"
  >
    <app-group-totals-display groupTotals [totals]="group().totals"/>
  </app-group-header-actions>
</div>
