<div class="mb-4 flex h-12 w-12 items-center justify-center rounded-xl bg-primary/10 text-primary">
  <ng-icon name="heroArchiveBox" class="text-2xl" />
</div>
<h2 class="text-lg font-semibold text-dark">Archiwizuj wpis?</h2>
<p class="mt-2 text-sm leading-relaxed text-muted">
  @if (personName()) {
    Wpis „{{ personName() }}” trafi do archiwum.
  } @else {
    Ten wpis trafi do archiwum.
  }
</p>
<div class="mt-6 flex justify-end gap-3">
  <app-button variant="secondary" [disabled]="loading()" (clicked)="onCancel()">
    Anuluj
  </app-button>
  <app-button [loading]="loading()" (clicked)="confirmed.emit()">Archiwizuj</app-button>
</div>
