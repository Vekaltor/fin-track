<div class="mb-4 flex h-12 w-12 items-center justify-center rounded-xl bg-debt/10 text-debt">
  <ng-icon name="heroExclamationTriangle" class="text-2xl" />
</div>
<h2 class="text-lg font-semibold text-dark">Usuń grupę?</h2>
<p class="mt-2 text-sm leading-relaxed text-muted">
  Wszystkie wpisy w grupie zostaną trwale usunięte.
</p>
<div class="mt-6 flex justify-end gap-3">
  <app-button variant="secondary" [disabled]="loading()" (clicked)="onCancel()">
    Anuluj
  </app-button>
  <app-button
    variant="danger_outlined"
    [loading]="loading()"
    (clicked)="confirmed.emit()"
  >
    Usuń
  </app-button>
</div>
