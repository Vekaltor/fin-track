@if (vm()?.filters; as filters) {
  <div
    class="flex flex-col gap-4 rounded-2xl border border-gray-200/90 bg-white p-4 shadow-sm ring-1 ring-black/[0.02]"
  >
    <app-filter-chip-row
      [options]="typeOptions"
      [activeValue]="filters.type"
      (selected)="onTypeFilter($event)"
    />
    <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
      <app-filter-chip-row
        [options]="statusOptions"
        [activeValue]="filters.status"
        (selected)="onStatusFilter($event)"
      />
      <app-sort-select [value]="filters.sort" (valueChange)="onSortChange($event)" />
    </div>
  </div>
}
