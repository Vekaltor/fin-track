@if (facade.loading$ | async) {
  <p class="py-8 text-center text-muted">Ładowanie...</p>
} @else {
  @if (facade.groups$ | async; as groups) {
    @if (groups.length === 0) {
      <p
        class="rounded-2xl border border-dashed border-gray-300 bg-white p-8 text-center text-muted"
      >
        Brak grup. Utwórz pierwszą grupę, aby dodać wpisy.
      </p>
    } @else {
      <div class="flex flex-col gap-4">
        @for (group of groups; track group.id) {
          <app-group-panel [group]="group" />
        }
      </div>
    }
  }
}
