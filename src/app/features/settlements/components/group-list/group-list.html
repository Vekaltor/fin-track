@if (isLoading()) {
  <div class="flex flex-col gap-4">
    @for (item of [1, 2, 3]; track item) {
      <div class="h-24 animate-pulse rounded-2xl bg-gray-100"></div>
    }
  </div>
} @else if (vm()?.groups; as groups) {
  @if (groups.length === 0) {
    <p class="rounded-2xl border border-dashed border-gray-300 bg-white p-8 text-center text-muted">
      Brak grup. Utwórz pierwszą grupę, aby dodać wpisy.
    </p>
  } @else {
    <div class="flex flex-col gap-4">
      @for (group of groups; track group.id) {
        <app-group-panel [group]="group" />
      }
    </div>
  }
}
