<div
  class="overflow-hidden rounded-2xl border border-gray-200/90 bg-white shadow-sm ring-1 ring-black/2"
>
  <app-group-header
    [group]="group()"
    (addEntry)="onShowEntryForm()"
    (deleteGroup)="onDeleteGroup()"
  />

  @if (showSettlementForm()) {
    <app-entry-form
      [group]="group()"
      [groupId]="group().id"
      [groupName]="group().name"
      [saving]="isSaving()"
      (saved)="onEntrySaved($event)"
      (cancelled)="onHideEntryForm()"
    />
  }

  @if (group().filteredSettlements.length > 0 && group().filteredSettlements.length === 0) {
    <p class="border-t border-gray-100 px-4 py-6 text-center text-sm text-muted">
      Brak wpisów pasujących do wybranych filtrów.
    </p>
  }

  @for (entry of group().filteredSettlements; track entry.id) {
    <app-entry-row
      [entry]="entry"
      [groupId]="group().id"
      [expanded]="isExpanded(entry.id)"
      [saving]="isSaving()"
      (toggleExpanded)="onToggleExpanded(entry.id)"
    />
  }
</div>
