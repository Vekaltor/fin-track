<div class="border-t border-gray-100 bg-gray-50/80 px-4 py-3">
  <div class="mb-3 flex flex-wrap items-center justify-between gap-2">
    <app-installment-panel-header />
    @if (hasSelection()) {
      <app-button
        variant="primary"
        className="!px-3 !py-1.5 text-xs"
        [loading]="saving()"
        (clicked)="onPaySelected()"
      >
        Zapłać zaznaczone ({{ selectedCount() }})
      </app-button>
    }
  </div>
  <div class="overflow-hidden rounded-xl border border-gray-200 bg-white">
    @for (installment of entry().installments; track installment.id) {
      <app-installment-row
        [installment]="installment"
        [saving]="saving()"
        [selected]="isSelected(installment.id)"
        (selectionChange)="onSelectionChange(installment.id, $event)"
        (pay)="onPaySingle($event)"
      />
    }
  </div>
  @if (unpaidInstallments().length > 1) {
    <p class="mt-2 text-xs text-muted">
      Zaznacz kilka rat i zapłać naraz - kolejne terminy przeliczą się wcześniej (plan vs aktualny
      termin w tabeli).
    </p>
  }
</div>
