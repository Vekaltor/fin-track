<div class="mx-auto flex w-full max-w-6xl flex-col gap-6">
  <app-settlements-header />

  <app-summary-cards />

  <app-filter-toolbar />

  @if (facade.showNewGroupForm$ | async) {
    <app-new-group-form />
  }

  @if (facade.error$ | async; as error) {
    @if (error) {
      <p class="rounded-lg bg-debt/10 px-4 py-2 text-sm text-debt">{{ error }}</p>
    }
  }

  <app-group-list />

  <app-settlements-confirm-dialog />
</div>
