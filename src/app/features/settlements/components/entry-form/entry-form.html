<form
  class="border-t border-gray-100 bg-gray-50/50 p-5"
  (submit)="handleSubmit($event)"
>
  <app-section-title [title]="'Nowy wpis - ' + groupName()"/>

  <div class="mt-4 grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-4">
    <app-select-field
      [field]="entryForm.direction"
      label="Kierunek"
      [options]="directionOptions"
    />

    <app-text-field
      [field]="entryForm.personName"
      label="Osoba"
      placeholder="Imię nazwisko"
    />

    <app-text-field
      [field]="entryForm.totalAmount"
      label="Kwota łączna (zł)"
      placeholder="np. 1 700 lub 99,50"
      inputMode="decimal"
    />

    <app-text-field
      [field]="entryForm.description"
      label="Opis"
      placeholder="Za co?"
    />

    @if (!entryForm.splitIntoInstallments().value()) {
      <app-date-field
        [field]="entryForm.dueDate"
        label="Termin"
      />
    }

    <div class="flex items-end pb-1">
      <app-checkbox-field [field]="entryForm.splitIntoInstallments">
        Rozbij na raty
      </app-checkbox-field>
    </div>
  </div>

  @if (entryForm.splitIntoInstallments().value()) {
    <div class="mt-4 grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
      <app-number-field
        [field]="entryForm.installmentCount"
        label="Liczba rat"
        placeholder="np. 12"
      />
      <div>
        <app-input-label label="Odstęp między ratami" className="mb-0"/>
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
          <app-number-field
            [field]="entryForm.installmentIntervalAmount"
            label=""
            class="shrink"
            placeholder="np. 12"
          />
          <app-select-field
            [field]="entryForm.installmentIntervalUnit"
            label=""
            class="min-w-50"
            placeholder="Wybierz okres"
            [options]="installmentIntervalUnitOptions"
            [className]="'h-[41.6px]'"
          />
        </div>
      </div>
      <app-date-field
        [field]="entryForm.dueDate"
        label="Termin pierwszej raty"
      />
    </div>
    <p class="mt-2 text-xs text-muted">
      Kolejne raty liczone od pierwszego terminu według wybranego odstępu. Kwota dzielona równo.
    </p>
  }

  <div class="mt-4">
    <app-form-actions [loading]="saving()" (cancelled)="onCancel()">
      Zapisz
    </app-form-actions>
  </div>
</form>
