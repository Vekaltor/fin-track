@if (totals().receivable > 0) {
  <span class="text-sm font-semibold text-receivable font-amount">
    +{{ totals().receivable | appCurrencyPln }}
  </span>
}
@if (totals().debt > 0) {
  <span class="text-sm font-semibold text-debt font-amount">
    -{{ totals().debt | appCurrencyPln }}
  </span>
}
