<div
  class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full"
  [class.bg-debt/10]="type() === EntryType.DEBT"
  [class.bg-receivable/10]="type() === EntryType.RECEIVABLE"
>
  @if (type() === EntryType.DEBT) {
    <ng-icon name="heroClock" class="text-lg text-debt" />
  } @else {
    <ng-icon name="heroArrowTrendingUp" class="text-lg text-receivable" />
  }
</div>
