<form
  class="rounded-2xl border border-gray-200/90 bg-white p-5 shadow-sm ring-1 ring-black/2"
  (submit)="handleSubmit($event)"
>
  <app-text-field
    [field]="groupForm.name"
    label="Nazwa grupy"
    placeholder="np. Znajomi, Rodzina, Praca"
    className="[&_label]:text-[11px]! [&_label]:font-semibold! [&_label]:uppercase! [&_label]:tracking-[0.08em]! [&_label]:text-muted!"
  />
  <div class="mt-4">
    <app-form-actions
      [loading]="facade.isSaving()"
      (cancelled)="onCancel()"
    >
      Utwórz
    </app-form-actions>
  </div>
</form>
